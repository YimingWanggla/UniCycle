{% extends 'marketplace/base.html' %}

{% block title %}Register - UniCycle{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4 mt-4 mb-5">
            <div class="card-body p-5">
                <h2 class="text-center artistic-title mb-2">Create Account</h2>
                <p class="text-center text-muted mb-4">University Email (.edu or .ac.uk) Required</p>
                
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    
                    <button type="submit" class="btn btn-success btn-lg w-100 mt-3 rounded-pill fw-bold">Register Now</button>
                </form>
                
                <hr class="my-4">
                <p class="text-center text-muted">Already have an account? <a href="{% url 'marketplace:login' %}" class="text-decoration-none fw-bold">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
