{% extends 'marketplace/base.html' %}

{% block title %}Login - UniCycle{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4 mt-4">
            <div class="card-body p-5">
                <h2 class="text-center artistic-title mb-4">Login to UniCycle</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-3 rounded-pill fw-bold">Login</button>
                </form>
                
                <hr class="my-4">
                <p class="text-center text-muted">Don't have an account? <a href="{% url 'marketplace:register' %}" class="text-decoration-none fw-bold">Register here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
